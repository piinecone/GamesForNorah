name: Deploy GamesForNorah to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: horse-stable/package-lock.json
      - name: Build horse-stable
        working-directory: horse-stable
        env:
          VITE_BASE: /GamesForNorah/horse-stable/
        run: npm ci && npm run build
      - name: Assemble site
        run: |
          mkdir -p _site/horse-stable
          cp -r horse-stable/dist/* _site/horse-stable/
          cp index.html _site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
