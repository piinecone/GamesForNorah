<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#6fad55" />
    <title>Games for Norah</title>
    <style>
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: manipulation;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: max(24px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right))
          max(24px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left));
        font-family:
          Inter, ui-rounded, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #87ceeb 0%, #6fad55 100%);
        color: #2d402a;
      }

      main {
        width: min(420px, 100%);
        padding: 28px 24px;
        border-radius: 16px;
        background: rgba(255, 248, 220, 0.94);
        box-shadow: 0 10px 30px rgba(45, 64, 42, 0.18);
        text-align: center;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.75rem;
      }

      p {
        margin: 0 0 20px;
        color: #4a6741;
      }

      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 12px;
      }

      a {
        display: block;
        padding: 14px 18px;
        border-radius: 12px;
        background: #7ebf62;
        color: #fff8e7;
        font-weight: 700;
        text-decoration: none;
        border: 2px solid #5f9f4c;
      }

      a:hover,
      a:focus-visible {
        background: #6aad52;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Games for Norah</h1>
      <p>Pick a game to play.</p>
      <ul>
        <li><a href="./horse-stable/">Horse Stable</a></li>
      </ul>
    </main>
  </body>
</html>
